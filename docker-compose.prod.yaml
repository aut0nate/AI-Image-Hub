services:
  ai-gallery:
    image: ghcr.io/aut0nate/ai-gallery:${IMAGE_TAG:-latest}
    container_name: ai-gallery
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/app/data/gallery.sqlite
      UPLOAD_DIR: /app/uploads
    networks:
      - edge-net
    expose:
      - "3000"
    volumes:
      - ai-gallery-data:/app/data
      - ai-gallery-uploads:/app/uploads
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    logging:
      options:
        max-size: 10m
        max-file: "3"

volumes:
  ai-gallery-data:
  ai-gallery-uploads:

networks:
  edge-net:
    external: true
