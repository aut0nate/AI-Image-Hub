name: CD - Build and deploy

on:
  workflow_run:
    workflows:
      - CI - Validate and build
    types:
      - completed

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/aut0nate/ai-gallery
  DEPLOY_PATH: /opt/stacks/ai-gallery

jobs:
  build-and-push:
    name: Build and push image
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: docker build -t "${IMAGE_NAME}:latest" .

      - name: Tag with commit SHA
        run: docker tag "${IMAGE_NAME}:latest" "${IMAGE_NAME}:${{ github.event.workflow_run.head_sha }}"

      - name: Push images
        run: |
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${{ github.event.workflow_run.head_sha }}"

  deploy:
    name: Deploy to production server
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          for required_secret in VPS_HOST VPS_PORT VPS_SSH_KEY VPS_USER; do
            if [ -z "${!required_secret}" ]; then
              echo "Missing required GitHub Actions secret: ${required_secret}"
              exit 1
            fi
          done

          cat > ~/.ssh/config << EOF
          Host production
            HostName ${VPS_HOST}
            Port ${VPS_PORT}
            User ${VPS_USER}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
            ServerAliveInterval 30
          EOF
          chmod 600 ~/.ssh/config

      - name: Prepare deployment directory
        run: |
          ssh production "mkdir -p '${DEPLOY_PATH}' && test -w '${DEPLOY_PATH}'"

      - name: Upload production Compose file
        run: |
          scp docker-compose.prod.yaml "production:${DEPLOY_PATH}/docker-compose.yaml"

      - name: Deploy container
        run: |
          ssh production << EOF
          set -e

          cd "${DEPLOY_PATH}"

          if [ ! -f .env ]; then
            echo "Missing ${DEPLOY_PATH}/.env. Create it on the VPS before deploying."
            exit 1
          fi

          if grep -q '^IMAGE_TAG=' .env; then
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ github.event.workflow_run.head_sha }}/" .env
          else
            printf '\nIMAGE_TAG=%s\n' "${{ github.event.workflow_run.head_sha }}" >> .env
          fi

          docker compose pull
          docker compose up -d
          docker image prune -f

          docker compose ps
          EOF
